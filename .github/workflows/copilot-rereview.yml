# Re-request a Copilot code review on every push to an open PR.
#
# Background: GitHub's repo ruleset `copilot_code_review` with
# `review_on_push: true` is supposed to do this automatically, but
# in practice it only fires on the initial review — follow-up
# commits stay on the previous review until someone clicks
# "Re-request review" in the UI. This workflow approximates that
# button click via the REST API on every PR sync (push).
#
# Token scope: GITHUB_TOKEN with `pull-requests: write` is enough
# to call the requested_reviewers endpoint. The `|| true` swallow
# is defensive — if the call returns non-2xx (e.g. Copilot already
# pending review on this exact commit) we don't want the action
# to fail and block the merge.

name: Auto-request Copilot review

on:
  pull_request:
    types: [synchronize]

permissions:
  pull-requests: write

jobs:
  rerequest:
    runs-on: ubuntu-latest
    steps:
      - name: Re-request Copilot reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers" \
            -f 'reviewers[]=copilot-pull-request-reviewer' \
            || true
